version: 2
enable-beta-ecosystems: true
updates:
  - package-ecosystem: "uv" 
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:  
      default-days: 7
